<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Error | HMMEDIA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Error gradient (Red to Orange) */
        .text-gradient {
            background: linear-gradient(135deg, #ef4444, #f97316); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-[#0b0f19] text-gray-300 min-h-screen relative overflow-x-hidden flex items-center justify-center p-4">

    <div class="absolute top-1/4 left-1/4 w-[400px] h-[400px] bg-red-600/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-orange-600/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>

    <div class="glass-panel rounded-3xl p-8 md:p-12 max-w-lg w-full text-center relative z-10 shadow-[0_0_40px_rgba(239,68,68,0.1)] border-t border-red-500/50">
        
        <div class="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(239,68,68,0.2)]">
            <i class="fa-solid fa-triangle-exclamation text-5xl text-red-500 drop-shadow-lg"></i>
        </div>

        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 tracking-tight">
            Oops! <span class="text-gradient">Error</span>
        </h1>

        <div class="bg-black/60 border border-red-500/20 rounded-xl p-4 mb-8 text-gray-300 text-sm md:text-base leading-relaxed font-mono text-left overflow-x-auto shadow-inner">
            {{.Error}}
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center w-full">
            
            <a href="/" class="group relative flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300 font-bold text-white hover:-translate-y-1 w-full sm:w-auto">
                <i class="fa-solid fa-house text-gray-400 group-hover:text-white transition-colors"></i>
                <span>Home</span>
            </a>

            <a href="https://t.me/biisalbot" target="_blank" class="group relative flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 transition-all duration-300 font-bold text-white shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] hover:-translate-y-1 w-full sm:w-auto">
                <i class="fa-brands fa-telegram text-white"></i>
                <span>Support</span>
            </a>
            
        </div>
    </div>

</body>
</html>
