<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HMMEDIA STREAM - Premium Stream</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Glass Effect */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Custom Scrollbar for Title */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body class="bg-[#0b0f19] text-gray-300 min-h-screen relative overflow-x-hidden">

    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-purple-600/20 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-blue-600/10 rounded-full mix-blend-screen filter blur-[120px] pointer-events-none"></div>

    <nav class="sticky top-0 z-50 glass-panel border-b border-white/5 px-6 py-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-3 text-2xl font-bold uppercase tracking-wider transition hover:scale-105 duration-300">
                <i class="fa-solid fa-play text-purple-500 drop-shadow-[0_0_10px_rgba(168,85,247,0.8)]"></i>
                <span class="text-gradient">HMMEDIA STREAM</span>
            </a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 relative z-10">

        <div class="rounded-2xl overflow-hidden shadow-[0_0_40px_rgba(59,130,246,0.15)] ring-1 ring-white/10 bg-black mb-8 relative group">
            <video class="w-full aspect-video object-contain"
                autoplay
                poster="https://w.wallhaven.cc/full/5g/wallhaven-5g22q5.png"
                controls
                controlsList="nodownload">
                <source src="{{.StreamLink}}">
            </video>
        </div>

        <div class="glass-panel rounded-2xl p-6 md:p-8 mb-8 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8">

                <div class="flex-1 w-full">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-500/10 text-blue-400 text-xs font-bold mb-4 border border-blue-500/20 tracking-wider">
                        <i class="fa-solid fa-microchip"></i> FILE SIZE: {{.Size}}
                    </div>
                    <h2 class="text-xl md:text-2xl lg:text-3xl font-bold text-white leading-tight break-words">
                        {{.Title}}
                    </h2>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto shrink-0">
                    
                    <a href="{{.DownloadLink}}" class="group relative flex items-center justify-center gap-2 px-10 py-3.5 rounded-xl bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 transition-all duration-300 font-bold text-white shadow-[0_0_20px_rgba(168,85,247,0.4)] hover:shadow-[0_0_30px_rgba(168,85,247,0.6)] hover:-translate-y-1">
                        <i class="fa-solid fa-cloud-arrow-down group-hover:animate-bounce"></i>
                        <span>Download Fast</span>
                    </a>

                </div>
            </div>
        </div>

        <div class="rounded-2xl p-6 md:p-8 bg-gradient-to-r from-[#2a1a10] to-transparent border border-orange-500/20 flex flex-col md:flex-row items-center justify-between gap-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-32 h-32 bg-orange-500/20 rounded-full mix-blend-screen filter blur-[50px]"></div>
            
            <div class="relative z-10 w-full md:w-auto text-center md:text-left">
                <h3 class="text-lg md:text-xl font-bold text-orange-400 flex items-center justify-center md:justify-start gap-2 mb-2">
                    <i class="fa-brands fa-vlc text-2xl"></i> Server Slow?
                </h3>
                <p class="text-orange-200/60 text-sm max-w-md">
                    If the online player is buffering, stream this file directly inside VLC Player for a lag-free experience.
                </p>
            </div>

            <a href="#" onclick="this.href = window.location.href + '&redirect=vlc'" class="relative z-10 shrink-0 flex items-center justify-center gap-2 px-8 py-3.5 rounded-xl bg-orange-500 hover:bg-orange-400 transition-all text-black font-bold whitespace-nowrap shadow-[0_0_15px_rgba(249,115,22,0.3)] hover:shadow-[0_0_25px_rgba(249,115,22,0.5)] hover:-translate-y-1 w-full md:w-auto">
                <i class="fa-solid fa-circle-play text-xl"></i>
                Open in VLC
            </a>
        </div>

    </main>

    <script src="/static/scripts/script.js"></script>
</body>
</html>
