<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.AppName}} - {{.Title}}</title>

<link rel="stylesheet" href="/static/styles/tailwind.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<style>
body {
    background-color: #141414;
}
.netflix-red {
    background-color: #e50914;
}
.netflix-red:hover {
    background-color: #f6121d;
}
.fade-bottom {
    background: linear-gradient(to top, #141414 10%, transparent 100%);
}
</style>
</head>

<body class="text-white">

<!-- NAVBAR -->
<header class="flex justify-between items-center px-6 py-4 bg-black">
    <h1 class="text-2xl font-bold text-red-600 tracking-widest">
        {{.AppName}}
    </h1>
</header>

<!-- HERO VIDEO SECTION -->
<section class="relative w-full">

    <video autoplay controls width="100%" class="w-full max-h-[80vh] object-cover">
        <source src="{{.StreamLink}}">
    </video>

    <div class="absolute bottom-0 left-0 w-full p-8 fade-bottom">
        <h2 class="text-3xl md:text-5xl font-bold mb-4">
            {{.Title}}
        </h2>

        <p class="text-gray-300 mb-6">
            File Size: {{.Size}}
        </p>

        <div class="flex flex-wrap gap-4">

            <a href="{{.StreamLink}}">
                <button class="netflix-red px-8 py-3 rounded font-bold text-lg shadow-lg">
                    <i class="fa-solid fa-play mr-2"></i> Play
                </button>
            </a>

            <a href="{{.DownloadLink}}">
                <button class="bg-gray-700 hover:bg-gray-600 px-8 py-3 rounded font-bold text-lg shadow-lg">
                    <i class="fa-solid fa-download mr-2"></i> Download
                </button>
            </a>

        </div>
    </div>

</section>

<!-- VLC SECTION -->
<section class="px-6 py-10 bg-black">
    <h3 class="text-xl font-bold text-red-500 mb-4">Watch in VLC</h3>
    <p class="text-gray-400 mb-4">
        Having buffering issues? Open directly in VLC for smooth playback.
    </p>

    <a href="#" onclick="this.href = window.location.href + '&redirect=vlc'">
        <button class="bg-red-600 hover:bg-red-700 px-6 py-2 rounded font-semibold">
            Open in VLC
        </button>
    </a>
</section>

<footer class="text-center text-gray-600 py-6 text-sm bg-black">
    © {{.AppName}} Streaming Service
</footer>

</body>
</html>
