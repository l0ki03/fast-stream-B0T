<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{{.AppName}} - {{.Title}}</title>

	<link rel="stylesheet" type="text/css" href="/static/styles/styles.css">
	<link rel="stylesheet" type="text/css" href="/static/styles/tailwind.css">
	<link rel="stylesheet"
		href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>

<body class="bg-brand-dark-blue text-white">

	<main class="overflow-x-hidden max-w-screen w-full text-sm">
		<div class="p-4 container mx-auto">

			<header class="pb-4 flex items-center justify-between">
				<a href="/">
					<h1 class="text-xl md:text-3xl text-blue font-bold uppercase">
						<i class="fa-solid fa-video"></i> {{.AppName}}
					</h1>
				</a>
			</header>

			<!-- VIDEO PLAYER -->
			<div class="w-full">
				<video class="max-h-screen rounded-lg"
					autoplay
					poster="https://w.wallhaven.cc/full/5g/wallhaven-5g22q5.png"
					controls
					width="100%">
					<source src="{{.StreamLink}}">
				</video>
			</div>

			<!-- TITLE -->
			<div class="mt-4">
				<h2 class="text-lg md:text-2xl break-all">
					{{.Title}}
				</h2>
				<p class="text-white/60 mt-2">
					File Size: {{.Size}}
				</p>
			</div>

			<!-- ACTION BUTTONS -->
			<div class="flex flex-wrap gap-4 mt-6">

				<!-- WATCH BUTTON -->
				<a href="{{.StreamLink}}">
					<button type="button"
						class="bg-blue-600 hover:bg-blue-500 rounded-lg px-6 py-3 text-lg font-bold uppercase">
						<i class="fa-solid fa-play mr-2"></i>
						Watch Online
					</button>
				</a>

				<!-- DOWNLOAD BUTTON -->
				<a href="{{.DownloadLink}}">
					<button type="button"
						class="bg-green-600 hover:bg-green-500 rounded-lg px-6 py-3 text-lg font-bold uppercase">
						<i class="fa-solid fa-circle-down mr-2"></i>
						Download File
					</button>
				</a>

			</div>

			<!-- VLC SECTION -->
			<div class="bg-gray-800/50 rounded-lg mt-10 p-4">

				<h2 class="text-lg font-bold text-orange-400 uppercase mb-4">
					Watch in VLC
				</h2>

				<p class="mb-3">
					If streaming is slow, you can watch directly in VLC.
				</p>

				<a href="#" onclick="this.href = window.location.href + '&redirect=vlc'">
					<button type="button"
						class="bg-orange-500 hover:bg-orange-400 text-black rounded-lg px-5 py-2 font-bold uppercase">
						<i class="fa-solid fa-circle-play mr-2"></i>
						Open in VLC
					</button>
				</a>

			</div>

		</div>
	</main>

</body>

<script src="/static/scripts/script.js"></script>

</html>
