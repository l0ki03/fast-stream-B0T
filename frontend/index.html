<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{.AppName}} - {{.Title}}</title>

<link rel="stylesheet" href="/static/styles/tailwind.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>

<style>
body {
    background: linear-gradient(135deg,#0f172a,#1e293b,#0f172a);
}
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center p-4">

<div class="max-w-5xl w-full glass rounded-2xl shadow-2xl p-6 md:p-10">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl md:text-3xl font-bold tracking-wide text-blue-400">
        <i class="fa-solid fa-play-circle mr-2"></i>{{.AppName}}
    </h1>
    <span class="text-sm text-white/60">Premium Stream</span>
</div>

<!-- VIDEO -->
<div class="rounded-xl overflow-hidden shadow-lg border border-white/10">
    <video autoplay controls width="100%" class="rounded-xl">
        <source src="{{.StreamLink}}">
    </video>
</div>

<!-- TITLE -->
<div class="mt-6">
    <h2 class="text-xl md:text-2xl font-semibold break-all">
        {{.Title}}
    </h2>
    <p class="text-white/50 mt-2 text-sm">
        File Size: {{.Size}}
    </p>
</div>

<!-- BUTTONS -->
<div class="flex flex-col md:flex-row gap-4 mt-8">

    <a href="{{.StreamLink}}" class="flex-1">
        <button class="w-full bg-gradient-to-r from-blue-500 to-blue-600 
        hover:scale-105 transition-all duration-300
        py-4 rounded-xl font-bold text-lg shadow-lg">
            <i class="fa-solid fa-play mr-2"></i>
            Watch Online
        </button>
    </a>

    <a href="{{.DownloadLink}}" class="flex-1">
        <button class="w-full bg-gradient-to-r from-green-500 to-green-600 
        hover:scale-105 transition-all duration-300
        py-4 rounded-xl font-bold text-lg shadow-lg">
            <i class="fa-solid fa-download mr-2"></i>
            Download Now
        </button>
    </a>

</div>

<!-- VLC -->
<div class="mt-10 glass rounded-xl p-6">
    <h3 class="text-lg font-bold text-orange-400 mb-3">
        Watch in VLC
    </h3>

    <p class="text-white/60 mb-4">
        If streaming is slow, open directly in VLC player.
    </p>

    <a href="#" onclick="this.href = window.location.href + '&redirect=vlc'">
        <button class="bg-orange-500 hover:bg-orange-400
        transition-all duration-300 px-6 py-3 rounded-lg font-semibold text-black">
            <i class="fa-solid fa-circle-play mr-2"></i>
            Open in VLC
        </button>
    </a>
</div>

<!-- FOOTER -->
<div class="text-center text-white/40 text-xs mt-10">
    Powered by {{.AppName}}
</div>

</div>

</body>
</html>
